name: ✨ 功能请求
description: 提议一个新功能或改进
title: "[Feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感谢提出功能建议！请详细描述你的需求。

  - type: textarea
    id: problem
    attributes:
      label: 问题/需求背景
      description: 描述当前面临的问题或需要解决的需求
      placeholder: 我正在尝试做... 但是...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 描述你希望如何实现
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 描述你考虑过的其他解决方案

  - type: dropdown
    id: scope
    attributes:
      label: 影响范围
      options:
        - Layer 0: Core Kernel（核心内核）
        - Layer 1: Evolution Engine（进化引擎）
        - Layer 1: Skills Library（技能库）
        - Layer 2: Application Factory（应用工厂）
        - API层
        - 监控界面
        - 文档
        - 其他
    validations:
      required: true

  - type: checkboxes
    id: phase
    attributes:
      label: 相关Phase
      options:
        - label: Phase 1: 核心骨架
        - label: Phase 2: Docker沙盒
        - label: Phase 3: 进化循环
        - label: Phase 4: API + 监控
        - label: Phase 5: 多任务并发

  - type: textarea
    id: additional
    attributes:
      label: 补充信息
      description: 其他相关上下文或截图
