<!DOCTYPE html>
<!--
  SEMDS Monitor - 自进化元开发系统监控界面 v2.0
  
  功能：
  - 用户登录/认证
  - 实时任务列表和状态
  - WebSocket连接实时推送进化进度
  - 进化控制（启动/暂停/恢复/中止）
  - 代码语法高亮显示
  - 得分趋势图表（Chart.js）
  - 策略效果对比图表
  - 进化速度趋势图表
  - 可视化测试用例编辑器
  
  技术栈：
  - 纯HTML/CSS/JavaScript（单文件）
  - Fetch API
  - WebSocket实时通信
  - Chart.js 数据可视化
  - Prism.js 语法高亮
-->
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEMDS 监控系统</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Prism.js -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif; 
            background: #0f172a; 
            color: #e2e8f0;
            min-height: 100vh;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 20px; }
        
        /* Header */
        .header { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #334155;
        }
        .header h1 { font-size: 24px; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header-status { display: flex; align-items: center; gap: 15px; }
        .user-info { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #94a3b8; }
        .status-indicator { width: 10px; height: 10px; border-radius: 50%; background: #4caf50; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Grid Layout */
        .grid { display: grid; grid-template-columns: 360px 1fr; gap: 20px; }
        
        /* Cards */
        .card { 
            background: #1e293b; 
            border-radius: 12px; 
            padding: 20px;
            border: 1px solid #334155;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 15px;
            color: #f1f5f9;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-box {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #60a5fa; }
        .stat-label { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        
        /* Task List */
        .task-item { 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 8px;
            cursor: pointer; 
            transition: all 0.2s;
            background: #0f172a;
            border: 1px solid #334155;
        }
        .task-item:hover { border-color: #60a5fa; transform: translateX(4px); }
        .task-item.active { background: rgba(96, 165, 250, 0.1); border-color: #60a5fa; }
        .task-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        .task-name { font-weight: 500; font-size: 14px; color: #f1f5f9; }
        .task-meta { font-size: 12px; color: #64748b; display: flex; justify-content: space-between; }
        
        /* Status dots */
        .status { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .status.running { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
        .status.pending { background: #ff9800; }
        .status.success { background: #2196f3; }
        .status.failed { background: #f44336; }
        .status.paused { background: #9e9e9e; }
        .status.aborted { background: #795548; }
        
        /* Progress Bar */
        .progress-bar { height: 6px; background: #0f172a; border-radius: 3px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #4caf50, #8bc34a); transition: width 0.5s ease; border-radius: 3px; }
        .progress-fill.running { background: linear-gradient(90deg, #2196f3, #64b5f6); background-size: 200% 100%; animation: progress-pulse 2s ease infinite; }
        @keyframes progress-pulse { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        
        /* Buttons */
        .btn { padding: 10px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; font-family: inherit; }
        .btn-primary { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
        .btn-secondary { background: #334155; color: #e2e8f0; }
        .btn-secondary:hover { background: #475569; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Score Cards */
        .score-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0; }
        .score-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #334155;
        }
        .score-value { font-size: 36px; font-weight: bold; color: #60a5fa; }
        .score-value.running { color: #4ade80; animation: glow 2s ease-in-out infinite; }
        @keyframes glow { 0%, 100% { text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); } 50% { text-shadow: 0 0 20px rgba(74, 222, 128, 0.8); } }
        .score-label { font-size: 13px; color: #64748b; margin-top: 5px; }
        
        /* Code Block */
        .code-block { margin: 0; border-radius: 8px; max-height: 500px; overflow-y: auto; border: 1px solid #334155; }
        .code-block pre { margin: 0; font-size: 13px; line-height: 1.6; }
        
        /* Controls */
        .controls { display: flex; gap: 12px; margin: 20px 0; flex-wrap: wrap; }
        
        /* Charts */
        .chart-container { height: 280px; margin: 15px 0; background: #0f172a; border-radius: 8px; padding: 15px; border: 1px solid #334155; }
        .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
        
        /* Generation List */
        .generation-list { max-height: 300px; overflow-y: auto; border: 1px solid #334155; border-radius: 8px; background: #0f172a; }
        .generation-item { padding: 12px 16px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .generation-item:last-child { border-bottom: none; }
        .generation-badge { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: rgba(96, 165, 250, 0.2); color: #60a5fa; border-radius: 12px; font-size: 12px; font-weight: 500; }
        .strategy-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; background: rgba(167, 139, 250, 0.2); color: #a78bfa; border-radius: 10px; font-size: 11px; margin-left: 8px; }
        .score-trend { display: flex; align-items: center; gap: 4px; font-size: 13px; font-weight: 500; }
        .trend-up { color: #4ade80; }
        .trend-down { color: #f87171; }
        .trend-flat { color: #94a3b8; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: #64748b; }
        .empty-state-icon { font-size: 48px; margin-bottom: 15px; opacity: 0.5; }
        
        /* Loading */
        .loading { display: inline-block; width: 20px; height: 20px; border: 2px solid #1e293b; border-top: 2px solid #60a5fa; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Live Indicator */
        .live-indicator { display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(74, 222, 128, 0.1); color: #4ade80; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid rgba(74, 222, 128, 0.3); }
        .live-dot { width: 6px; height: 6px; background: #4ade80; border-radius: 50%; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal-overlay.active { display: flex; }
        .modal { background: #1e293b; border-radius: 12px; width: 90%; max-width: 700px; max-height: 90vh; overflow-y: auto; border: 1px solid #334155; }
        .modal-header { padding: 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #334155; display: flex; justify-content: flex-end; gap: 10px; }
        .close-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b; }
        .close-btn:hover { color: #e2e8f0; }
        
        /* Forms */
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: #cbd5e1; }
        .form-group input, .form-group textarea, .form-group select { 
            width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; 
            font-size: 14px; font-family: inherit; background: #0f172a; color: #e2e8f0; 
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { 
            outline: none; border-color: #60a5fa; box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1); 
        }
        .form-group textarea { min-height: 150px; font-family: 'Consolas', 'Monaco', monospace; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        /* Test Case Editor */
        .test-case-editor { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 15px; margin-bottom: 15px; }
        .test-case-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; }
        .test-case-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: #1e293b; border-radius: 6px; margin-bottom: 8px; }
        .test-case-item input { flex: 1; background: #0f172a; border: 1px solid #334155; padding: 8px; border-radius: 4px; color: #e2e8f0; }
        .test-case-item .remove-btn { background: #ef4444; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .add-test-btn { width: 100%; padding: 10px; background: #334155; border: 1px dashed #475569; color: #94a3b8; border-radius: 6px; cursor: pointer; }
        .add-test-btn:hover { background: #475569; color: #e2e8f0; }
        
        /* Login Form */
        .login-form { max-width: 400px; margin: 0 auto; }
        .login-logo { text-align: center; margin-bottom: 30px; }
        .login-logo h1 { font-size: 32px; background: linear-gradient(90deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .login-logo p { color: #64748b; font-size: 14px; }
        
        /* Tabs */
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; border-bottom: 1px solid #334155; }
        .tab { padding: 12px 20px; cursor: pointer; color: #64748b; border-bottom: 2px solid transparent; transition: all 0.2s; }
        .tab:hover { color: #94a3b8; }
        .tab.active { color: #60a5fa; border-bottom-color: #60a5fa; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1>SEMDS 监控系统</h1>
                <p style="opacity: 0.7; margin-top: 5px; font-size: 14px;">自进化元开发系统</p>
            </div>
            <div class="header-status">
                <div id="connection-status" style="display: flex; align-items: center; gap: 8px; font-size: 14px; color: #64748b;">
                    <span class="status-indicator"></span>
                    <span>已连接</span>
                </div>
                <div id="user-section" style="display: none;">
                    <div class="user-info">
                        <span id="username-display">用户</span>
                        <button class="btn btn-secondary" onclick="logout()">退出</button>
                    </div>
                </div>
                <div id="login-section">
                    <button class="btn btn-primary" onclick="openLoginModal()">登录</button>
                </div>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-grid">
            <div class="stat-box">
                <div class="stat-number" id="stat-total">0</div>
                <div class="stat-label">总任务</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-active">0</div>
                <div class="stat-label">运行中</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-completed">0</div>
                <div class="stat-label">已完成</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="stat-generations">0</div>
                <div class="stat-label">总进化代</div>
            </div>
        </div>
        
        <!-- Main Grid -->
        <div class="grid">
            <!-- Sidebar: Task List -->
            <div class="card">
                <div class="card-title">
                    <span>任务列表</span>
                    <button class="btn btn-primary" onclick="openCreateModal()">+ 新建</button>
                </div>
                <div id="task-list">
                    <div class="empty-state">
                        <div class="empty-state-icon">加载中</div>
                        <p>加载任务...</p>
                    </div>
                </div>
            </div>
            
            <!-- Main: Task Detail -->
            <div class="card">
                <div id="task-detail">
                    <div class="empty-state">
                        <div class="empty-state-icon">选择任务</div>
                        <p>请选择一个任务查看详情</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal-overlay" id="login-modal">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h3>用户登录</h3>
                <button class="close-btn" onclick="closeLoginModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="login-logo">
                    <h1>SEMDS</h1>
                    <p>自进化元开发系统</p>
                </div>
                <div class="login-form">
                    <div class="form-group">
                        <label>用户名</label>
                        <input type="text" id="login-username" placeholder="输入用户名" value="admin">
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input type="password" id="login-password" placeholder="输入密码" value="admin">
                    </div>
                    <div id="login-error" style="color: #ef4444; font-size: 14px; margin-bottom: 15px; display: none;"></div>
                    <button class="btn btn-primary" style="width: 100%;" onclick="submitLogin()">登录</button>
                    <p style="text-align: center; margin-top: 15px; font-size: 13px; color: #64748b;">
                        测试账号: admin / admin
                    </p>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div class="modal-overlay" id="create-modal">
        <div class="modal" style="max-width: 800px;">
            <div class="modal-header">
                <h3>创建新进化任务</h3>
                <button class="close-btn" onclick="closeCreateModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('basic')">基本信息</div>
                    <div class="tab" onclick="switchTab('code')">代码与测试</div>
                </div>
                
                <!-- Basic Info Tab -->
                <div id="tab-basic" class="tab-content active">
                    <div class="form-group">
                        <label>任务名称 *</label>
                        <input type="text" id="task-name" placeholder="例如：排序算法优化">
                    </div>
                    <div class="form-group">
                        <label>任务描述</label>
                        <input type="text" id="task-description" placeholder="简要描述任务目标">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>最大进化代数</label>
                            <input type="number" id="task-max-gen" value="50" min="1" max="200">
                        </div>
                        <div class="form-group">
                            <label>目标得分 (0-1)</label>
                            <input type="number" id="task-target-score" value="0.95" min="0" max="1" step="0.01">
                        </div>
                    </div>
                </div>
                
                <!-- Code & Tests Tab -->
                <div id="tab-code" class="tab-content">
                    <div class="form-group">
                        <label>函数签名</label>
                        <input type="text" id="task-signature" value="def solution(data: list) -> list:" placeholder="def solution(args):">
                    </div>
                    <div class="form-group">
                        <label>初始代码 (Python) *</label>
                        <textarea id="task-code" placeholder="def solution(data):&#10;    # 在此编写代码&#10;    return sorted(data)"></textarea>
                    </div>
                    <div class="form-group">
                        <label>测试用例编辑器</label>
                        <div class="test-case-editor">
                            <div class="test-case-list" id="test-case-list">
                                <!-- Test cases will be added here -->
                            </div>
                            <button class="add-test-btn" onclick="addTestCase()">+ 添加测试用例</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeCreateModal()">取消</button>
                <button class="btn btn-primary" onclick="submitCreateTask()">创建任务</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // Configuration & State
        // ============================================
        const API_BASE = '/api';
        const WS_BASE = `ws://${window.location.host}`;
        
        let currentTaskId = null;
        let ws = null;
        let tasks = [];
        let authToken = localStorage.getItem('semds_token');
        let currentUser = null;
        
        // Chart instances
        let scoreChart = null;
        let strategyChart = null;
        let velocityChart = null;
        
        // Data storage
        let generationData = [];
        let strategyStats = {};
        let testCases = [
            { input: '[3, 1, 2]', expected: '[1, 2, 3]' },
            { input: '[5, 4, 3, 2, 1]', expected: '[1, 2, 3, 4, 5]' }
        ];

        // ============================================
        // Initialization
        // ============================================
        async function init() {
            // Check if already logged in
            if (authToken) {
                await validateToken();
            }
            
            await loadSystemStats();
            await loadTasks();
            
            // Auto refresh
            setInterval(() => {
                loadSystemStats();
                loadTasks();
            }, 5000);
            
            // Initialize test case editor
            renderTestCases();
        }

        // ============================================
        // Authentication
        // ============================================
        async function validateToken() {
            try {
                const resp = await fetch(`${API_BASE}/auth/me`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });
                if (resp.ok) {
                    currentUser = await resp.json();
                    updateUIForLogin();
                } else {
                    logout();
                }
            } catch (e) {
                logout();
            }
        }

        function openLoginModal() {
            document.getElementById('login-modal').classList.add('active');
            document.getElementById('login-error').style.display = 'none';
        }

        function closeLoginModal() {
            document.getElementById('login-modal').classList.remove('active');
        }

        async function submitLogin() {
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            
            try {
                const formData = new URLSearchParams();
                formData.append('username', username);
                formData.append('password', password);
                
                const resp = await fetch(`${API_BASE}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                
                if (resp.ok) {
                    const data = await resp.json();
                    authToken = data.access_token;
                    localStorage.setItem('semds_token', authToken);
                    currentUser = data.user;
                    updateUIForLogin();
                    closeLoginModal();
                    await loadTasks();
                } else {
                    const error = await resp.json();
                    document.getElementById('login-error').textContent = error.detail || '登录失败';
                    document.getElementById('login-error').style.display = 'block';
                }
            } catch (e) {
                document.getElementById('login-error').textContent = '网络错误';
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function logout() {
            authToken = null;
            currentUser = null;
            localStorage.removeItem('semds_token');
            document.getElementById('user-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'block';
        }

        function updateUIForLogin() {
            if (currentUser) {
                document.getElementById('user-section').style.display = 'block';
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('username-display').textContent = currentUser.username;
            }
        }

        // ============================================
        // API Helpers
        // ============================================
        async function apiGet(url) {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const resp = await fetch(`${API_BASE}${url}`, { headers });
            if (resp.status === 401) { logout(); }
            return resp;
        }

        async function apiPost(url, data) {
            const headers = { 'Content-Type': 'application/json' };
            if (authToken) headers['Authorization'] = `Bearer ${authToken}`;
            const resp = await fetch(`${API_BASE}${url}`, {
                method: 'POST',
                headers,
                body: data ? JSON.stringify(data) : null
            });
            if (resp.status === 401) { logout(); }
            return resp;
        }

        // ============================================
        // Data Loading
        // ============================================
        async function loadSystemStats() {
            try {
                const resp = await apiGet('/stats');
                if (resp.ok) {
                    const data = await resp.json();
                    document.getElementById('stat-total').textContent = data.total_tasks;
                    document.getElementById('stat-active').textContent = data.active_tasks;
                    document.getElementById('stat-completed').textContent = data.completed_tasks;
                    document.getElementById('stat-generations').textContent = data.total_generations;
                }
            } catch (e) { console.error('Failed to load stats:', e); }
        }

        async function loadTasks() {
            try {
                const resp = await apiGet('/tasks');
                if (resp.ok) {
                    tasks = await resp.json();
                    renderTaskList();
                    if (currentTaskId) {
                        const task = tasks.find(t => t.id === currentTaskId);
                        if (task) updateTaskDetailHeader(task);
                    }
                }
            } catch (e) { console.error('Failed to load tasks:', e); }
        }

        async function loadGenerationHistory(taskId) {
            try {
                const resp = await apiGet(`/tasks/${taskId}/generations`);
                if (resp.ok) {
                    const generations = await resp.json();
                    generationData = generations.map(g => ({
                        generation: g.gen_number,
                        score: g.final_score || g.intrinsic_score,
                        avgScore: (g.intrinsic_score + (g.extrinsic_score || 0)) / 2,
                        strategy: g.strategy_name || 'unknown',
                        velocity: g.velocity || 0,
                        improved: g.improved || false
                    }));
                    
                    // Calculate strategy stats
                    strategyStats = {};
                    generationData.forEach(g => {
                        if (!strategyStats[g.strategy]) {
                            strategyStats[g.strategy] = { count: 0, totalScore: 0, improvements: 0 };
                        }
                        strategyStats[g.strategy].count++;
                        strategyStats[g.strategy].totalScore += g.score;
                        if (g.improved) strategyStats[g.strategy].improvements++;
                    });
                    
                    updateCharts();
                }
            } catch (e) { console.error('Failed to load generations:', e); }
        }

        // ============================================
        // UI Rendering
        // ============================================
        function renderTaskList() {
            const container = document.getElementById('task-list');
            if (tasks.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">暂无任务</div>
                        <p>点击"新建"创建任务</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = tasks.map(task => `
                <div class="task-item ${task.id === currentTaskId ? 'active' : ''}" 
                     onclick="selectTask('${task.id}')">
                    <div class="task-header">
                        <span class="task-name">
                            <span class="status ${task.status}"></span>
                            ${escapeHtml(task.name)}
                        </span>
                    </div>
                    <div class="task-meta">
                        <span>第 ${task.current_generation} 代</span>
                        <span>得分: ${(task.best_score * 100).toFixed(1)}%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill ${task.status === 'running' ? 'running' : ''}" 
                             style="width: ${task.best_score * 100}%"></div>
                    </div>
                </div>
            `).join('');
        }

        async function selectTask(taskId) {
            currentTaskId = taskId;
            generationData = [];
            strategyStats = {};
            renderTaskList();
            
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            
            renderTaskDetail(task);
            connectWebSocket(taskId);
            await loadGenerationHistory(taskId);
        }

        function renderTaskDetail(task) {
            const container = document.getElementById('task-detail');
            const statusText = {
                'pending': '等待中', 'running': '运行中', 'paused': '已暂停',
                'success': '成功', 'failed': '失败', 'aborted': '已中止'
            }[task.status] || task.status;
            
            const isRunning = task.status === 'running';
            
            container.innerHTML = `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <div>
                        <h2 style="font-size: 20px; margin-bottom: 8px;">${escapeHtml(task.name)}</h2>
                        <p style="color: #64748b; font-size: 14px;">${escapeHtml(task.description || '')}</p>
                    </div>
                    ${isRunning ? '<span class="live-indicator"><span class="live-dot"></span>实时监控中</span>' : ''}
                </div>
                
                <div class="score-cards">
                    <div class="score-card">
                        <div class="score-value ${isRunning ? 'running' : ''}" id="detail-generation">${task.current_generation}</div>
                        <div class="score-label">当前代数</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value ${isRunning ? 'running' : ''}" id="detail-score">${(task.best_score * 100).toFixed(1)}%</div>
                        <div class="score-label">最佳得分</div>
                    </div>
                    <div class="score-card">
                        <div class="score-value">${statusText}</div>
                        <div class="score-label">状态</div>
                    </div>
                </div>
                
                <div class="controls" id="detail-controls">
                    ${renderControls(task.status)}
                </div>
                
                <div class="charts-grid">
                    <div>
                        <div class="card-title">得分趋势</div>
                        <div class="chart-container">
                            <canvas id="score-chart"></canvas>
                        </div>
                    </div>
                    <div>
                        <div class="card-title">策略效果对比</div>
                        <div class="chart-container">
                            <canvas id="strategy-chart"></canvas>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="card-title">进化速度趋势</div>
                    <div class="chart-container" style="height: 200px;">
                        <canvas id="velocity-chart"></canvas>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="card-title">最新代码</div>
                    <div class="code-block">
                        <pre><code class="language-python" id="latest-code"># 加载中...</code></pre>
                    </div>
                </div>
                
                <div style="margin-top: 20px;">
                    <div class="card-title">进化历史</div>
                    <div class="generation-list" id="generation-list">
                        <div class="empty-state" style="padding: 20px;">暂无进化记录</div>
                    </div>
                </div>
            `;
            
            initCharts();
            loadBestCode(task.id);
        }

        function updateTaskDetailHeader(task) {
            const genEl = document.getElementById('detail-generation');
            const scoreEl = document.getElementById('detail-score');
            const controlsEl = document.getElementById('detail-controls');
            
            if (genEl) genEl.textContent = task.current_generation;
            if (scoreEl) scoreEl.textContent = (task.best_score * 100).toFixed(1) + '%';
            if (controlsEl) {
                const newControls = renderControls(task.status);
                if (controlsEl.innerHTML.trim() !== newControls.trim()) {
                    controlsEl.innerHTML = newControls;
                }
            }
        }

        function renderControls(status) {
            switch (status) {
                case 'pending':
                    return `<button class="btn btn-primary" onclick="startEvolution()">开始进化</button>`;
                case 'running':
                    return `
                        <button class="btn btn-secondary" onclick="pauseEvolution()">暂停</button>
                        <button class="btn btn-danger" onclick="abortEvolution()">中止</button>
                    `;
                case 'paused':
                    return `
                        <button class="btn btn-primary" onclick="resumeEvolution()">恢复</button>
                        <button class="btn btn-danger" onclick="abortEvolution()">中止</button>
                    `;
                default:
                    return `<p style="color: #64748b;">进化已${status === 'success' ? '成功完成' : '结束'}</p>`;
            }
        }

        // ============================================
        // Charts
        // ============================================
        function initCharts() {
            initScoreChart();
            initStrategyChart();
            initVelocityChart();
            updateCharts();
        }

        function initScoreChart() {
            const ctx = document.getElementById('score-chart');
            if (!ctx) return;
            if (scoreChart) scoreChart.destroy();
            
            scoreChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '最佳得分',
                        data: [],
                        borderColor: '#60a5fa',
                        backgroundColor: 'rgba(96, 165, 250, 0.1)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 3,
                        pointHoverRadius: 5
                    }, {
                        label: '平均得分',
                        data: [],
                        borderColor: '#94a3b8',
                        borderWidth: 1,
                        borderDash: [5, 5],
                        tension: 0.3,
                        pointRadius: 0,
                        pointHoverRadius: 3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: { intersect: false, mode: 'index' },
                    plugins: {
                        legend: { position: 'top', align: 'end', labels: { color: '#94a3b8' } },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.dataset.label + ': ' + (context.parsed.y * 100).toFixed(1) + '%';
                                }
                            }
                        }
                    },
                    scales: {
                        x: { ticks: { color: '#64748b' }, grid: { color: '#334155' } },
                        y: { 
                            min: 0, max: 1, 
                            ticks: { color: '#64748b', callback: v => (v * 100).toFixed(0) + '%' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        function initStrategyChart() {
            const ctx = document.getElementById('strategy-chart');
            if (!ctx) return;
            if (strategyChart) strategyChart.destroy();
            
            strategyChart = new Chart(ctx, {
                type: 'bar',
                data: { labels: [], datasets: [] },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false }
                    },
                    scales: {
                        x: { ticks: { color: '#64748b' }, grid: { color: '#334155' } },
                        y: { 
                            beginAtZero: true,
                            max: 1,
                            ticks: { color: '#64748b', callback: v => (v * 100).toFixed(0) + '%' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        function initVelocityChart() {
            const ctx = document.getElementById('velocity-chart');
            if (!ctx) return;
            if (velocityChart) velocityChart.destroy();
            
            velocityChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: '进化速度',
                        data: [],
                        borderColor: '#4ade80',
                        backgroundColor: 'rgba(74, 222, 128, 0.1)',
                        borderWidth: 2,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { 
                            beginAtZero: true,
                            ticks: { color: '#64748b' },
                            grid: { color: '#334155' }
                        }
                    }
                }
            });
        }

        function updateCharts() {
            if (!generationData.length) return;
            
            // Update score chart
            if (scoreChart) {
                scoreChart.data.labels = generationData.map(d => `第${d.generation}代`);
                scoreChart.data.datasets[0].data = generationData.map(d => d.score);
                scoreChart.data.datasets[1].data = generationData.map(d => d.avgScore || d.score);
                scoreChart.update();
            }
            
            // Update strategy chart
            if (strategyChart && Object.keys(strategyStats).length > 0) {
                const strategies = Object.keys(strategyStats);
                const avgScores = strategies.map(s => strategyStats[s].totalScore / strategyStats[s].count);
                
                strategyChart.data.labels = strategies;
                strategyChart.data.datasets = [{
                    label: '平均得分',
                    data: avgScores,
                    backgroundColor: strategies.map((_, i) => 
                        `hsl(${200 + i * 40}, 70%, 60%)`
                    ),
                    borderRadius: 4
                }];
                strategyChart.update();
            }
            
            // Update velocity chart
            if (velocityChart) {
                velocityChart.data.labels = generationData.map(d => `第${d.generation}代`);
                velocityChart.data.datasets[0].data = generationData.map(d => d.velocity || 0);
                velocityChart.update();
            }
        }

        // ============================================
        // WebSocket
        // ============================================
        function connectWebSocket(taskId) {
            if (ws) ws.close();
            
            ws = new WebSocket(`${WS_BASE}/ws/tasks/${taskId}`);
            
            ws.onopen = () => {
                document.getElementById('connection-status').innerHTML = 
                    '<span class="status-indicator"></span><span>实时监控中</span>';
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleWebSocketMessage(data);
            };
            
            ws.onclose = () => {
                document.getElementById('connection-status').innerHTML = 
                    '<span class="status-indicator" style="background: #f44336;"></span><span>已断开</span>';
            };
        }

        function handleWebSocketMessage(data) {
            const task = tasks.find(t => t.id === currentTaskId);
            if (!task) return;
            
            task.current_generation = data.generation || task.current_generation;
            task.best_score = data.best_score || task.best_score;
            task.status = data.status || task.status;
            
            updateTaskDetailHeader(task);
            renderTaskList();
            
            if (data.generation && data.best_score !== undefined) {
                const newData = {
                    generation: data.generation,
                    score: data.best_score,
                    avgScore: data.avg_score,
                    strategy: data.strategy || 'unknown',
                    velocity: data.velocity || 0,
                    improved: data.improved
                };
                generationData.push(newData);
                updateCharts();
                
                // Update strategy stats
                const s = newData.strategy;
                if (!strategyStats[s]) {
                    strategyStats[s] = { count: 0, totalScore: 0, improvements: 0 };
                }
                strategyStats[s].count++;
                strategyStats[s].totalScore += newData.score;
                if (newData.improved) strategyStats[s].improvements++;
                
                updateGenerationList(newData);
            }
            
            if (data.code) {
                const codeBlock = document.querySelector('#latest-code');
                if (codeBlock) {
                    codeBlock.textContent = data.code;
                    Prism.highlightElement(codeBlock);
                }
            }
        }

        function updateGenerationList(gen) {
            const list = document.getElementById('generation-list');
            if (!list) return;
            
            if (list.querySelector('.empty-state')) {
                list.innerHTML = '';
            }
            
            const item = document.createElement('div');
            item.className = 'generation-item';
            item.innerHTML = `
                <span>
                    <span class="generation-badge">第 ${gen.generation} 代</span>
                    <span class="strategy-badge">${gen.strategy}</span>
                </span>
                <span class="score-trend ${gen.improved ? 'trend-up' : 'trend-flat'}">
                    ${gen.improved ? '提升' : '稳定'} ${(gen.score * 100).toFixed(1)}%
                </span>
            `;
            list.insertBefore(item, list.firstChild);
            
            while (list.children.length > 20) {
                list.removeChild(list.lastChild);
            }
        }

        // ============================================
        // Task Controls
        // ============================================
        async function startEvolution() { await controlEvolution('start'); }
        async function pauseEvolution() { await controlEvolution('pause'); }
        async function resumeEvolution() { await controlEvolution('resume'); }
        async function abortEvolution() { 
            if (!confirm('确定要中止进化吗？')) return;
            await controlEvolution('abort'); 
        }

        async function controlEvolution(action) {
            if (!currentTaskId) return;
            const resp = await apiPost(`/tasks/${currentTaskId}/${action}`, null);
            if (resp.ok) {
                await loadTasks();
                await selectTask(currentTaskId);
            } else {
                const error = await resp.json();
                alert('操作失败: ' + (error.detail || '未知错误'));
            }
        }

        async function loadBestCode(taskId) {
            try {
                const resp = await apiGet(`/tasks/${taskId}/best`);
                if (resp.ok) {
                    const data = await resp.json();
                    const codeBlock = document.querySelector('#latest-code');
                    if (codeBlock) {
                        codeBlock.textContent = data.code || '# 暂无代码';
                        Prism.highlightElement(codeBlock);
                    }
                }
            } catch (e) { console.error('Failed to load code:', e); }
        }

        // ============================================
        // Create Task Modal
        // ============================================
        function openCreateModal() {
            if (!authToken) {
                alert('请先登录');
                openLoginModal();
                return;
            }
            document.getElementById('create-modal').classList.add('active');
        }

        function closeCreateModal() {
            document.getElementById('create-modal').classList.remove('active');
            document.getElementById('task-name').value = '';
            document.getElementById('task-description').value = '';
            document.getElementById('task-code').value = '';
            testCases = [
                { input: '[3, 1, 2]', expected: '[1, 2, 3]' },
                { input: '[5, 4, 3, 2, 1]', expected: '[1, 2, 3, 4, 5]' }
            ];
            renderTestCases();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
        }

        // ============================================
        // Test Case Editor
        // ============================================
        function renderTestCases() {
            const container = document.getElementById('test-case-list');
            container.innerHTML = testCases.map((tc, i) => `
                <div class="test-case-item">
                    <input type="text" placeholder="输入 (JSON)" value="${escapeHtml(tc.input)}" 
                           onchange="updateTestCase(${i}, 'input', this.value)">
                    <span style="color: #64748b;">→</span>
                    <input type="text" placeholder="预期输出 (JSON)" value="${escapeHtml(tc.expected)}"
                           onchange="updateTestCase(${i}, 'expected', this.value)">
                    <button class="remove-btn" onclick="removeTestCase(${i})">删除</button>
                </div>
            `).join('');
        }

        function addTestCase() {
            testCases.push({ input: '', expected: '' });
            renderTestCases();
        }

        function removeTestCase(index) {
            testCases.splice(index, 1);
            renderTestCases();
        }

        function updateTestCase(index, field, value) {
            testCases[index][field] = value;
        }

        // ============================================
        // Submit Create Task
        // ============================================
        async function submitCreateTask() {
            const name = document.getElementById('task-name').value.trim();
            const description = document.getElementById('task-description').value.trim();
            const signature = document.getElementById('task-signature').value.trim();
            const maxGenerations = parseInt(document.getElementById('task-max-gen').value);
            const targetScore = parseFloat(document.getElementById('task-target-score').value);
            const code = document.getElementById('task-code').value.trim();
            
            if (!name) { alert('请输入任务名称'); return; }
            if (!code) { alert('请输入初始代码'); return; }
            
            // Build test code from test cases
            const testCode = buildTestCode(signature, code, testCases);
            
            const taskData = {
                name,
                description: description || name,
                target_function_signature: signature || 'def solution(data):',
                test_code: testCode,
                max_generations: maxGenerations,
                success_criteria: { target_score: targetScore }
            };
            
            const resp = await apiPost('/tasks', taskData);
            if (resp.ok) {
                const result = await resp.json();
                closeCreateModal();
                await loadTasks();
                selectTask(result.id);
            } else {
                const error = await resp.json();
                alert('创建失败: ' + (error.detail || '未知错误'));
            }
        }

        function buildTestCode(signature, code, tests) {
            const testCasesCode = tests
                .filter(t => t.input && t.expected)
                .map((t, i) => `    # Test ${i+1}
    assert solution(${t.input}) == ${t.expected}`)
                .join('\n');
            
            return `${code}

${testCasesCode || '    pass'}`;
        }

        // ============================================
        // Utilities
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Start
        init();
    </script>
</body>
</html>
